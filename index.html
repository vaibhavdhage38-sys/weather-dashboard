<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <p class="subtitle">Real-time weather information at your fingertips</p>
        </header>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Search for a city..."
                    class="search-input"
                >
                <button id="searchBtn" class="search-btn">
                    <i class="fas fa-search"></i> Search
                </button>
                <button id="locationBtn" class="location-btn" title="Use current location">
                    <i class="fas fa-map-marker-alt"></i>
                </button>
            </div>
            <div id="errorMsg" class="error-msg"></div>
        </div>

        <!-- Current Weather Section -->
        <div class="weather-container">
            <div class="current-weather">
                <div class="weather-header">
                    <h2 id="cityName" class="city-name">Loading...</h2>
                    <p id="date" class="date"></p>
                </div>

                <div class="weather-main">
                    <div class="weather-icon-container">
                        <img id="weatherIcon" src="" alt="Weather icon" class="weather-icon">
                    </div>
                    <div class="temperature-section">
                        <div id="temperature" class="temperature">--°C</div>
                        <div id="description" class="description">Loading...</div>
                    </div>
                </div>

                <div class="weather-details">
                    <div class="detail-card">
                        <i class="fas fa-tint"></i>
                        <span class="detail-label">Humidity</span>
                        <span id="humidity" class="detail-value">--%</span>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-wind"></i>
                        <span class="detail-label">Wind Speed</span>
                        <span id="windSpeed" class="detail-value">-- m/s</span>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-eye"></i>
                        <span class="detail-label">Visibility</span>
                        <span id="visibility" class="detail-value">-- km</span>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-compress"></i>
                        <span class="detail-label">Pressure</span>
                        <span id="pressure" class="detail-value">-- hPa</span>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-temperature-high"></i>
                        <span class="detail-label">Feels Like</span>
                        <span id="feelsLike" class="detail-value">--°C</span>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-sun"></i>
                        <span class="detail-label">UV Index</span>
                        <span id="uvIndex" class="detail-value">--</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 5-Day Forecast Section -->
        <div class="forecast-container">
            <h3 class="forecast-title"><i class="fas fa-calendar"></i> 5-Day Forecast</h3>
            <div id="forecastCards" class="forecast-cards">
                <!-- Forecast cards will be inserted here by JavaScript -->
            </div>
        </div>

        <!-- Recent Searches -->
        <div class="recent-searches">
            <h3><i class="fas fa-history"></i> Recent Searches</h3>
            <div id="recentList" class="recent-list">
                <p class="no-recent">No recent searches</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
